<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Baby Monitor PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        .card { width: 100%; max-width: 450px; border: 1px solid #1e293b; padding: 25px; border-radius: 30px; background: #1e293b; margin: auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        video { width: 100%; border-radius: 20px; margin-top: 15px; background: #000; min-height: 250px; object-fit: cover; }
        input { padding: 15px; border-radius: 15px; border: 1px solid #334155; width: 90%; margin: 15px 0; background: #0f172a; color: white; text-align: center; font-size: 1.2em; }
        .btn { padding: 18px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; margin: 10px 0; width: 100%; font-size: 1.1em; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-baby { background: #ef4444; color: white; }
        .btn-parent { background: #22c55e; color: white; }
        .btn-retry { background: #64748b; color: white; display: none; margin-top: 10px; }
        .status { margin: 15px 0; font-size: 0.9em; color: #94a3b8; line-height: 1.4; }
        #local-video { border: 2px solid #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h2>מוניטור בטוח PRO 🔒</h2>
        <input type="text" id="secret-id" placeholder="בחר מזהה (למשל: baby123)">
        
        <div id="mode-selection">
            <button class="btn btn-baby" onclick="setupBaby()">שדר מהטלפון (מצלמה)</button>
            <button class="btn btn-parent" onclick="setupParent()">צפה מהטאבלט (הורה)</button>
        </div>

        <div id="monitor-area">
            <p class="status" id="status-msg">מוכן לתחילת עבודה</p>
            <video id="remote-video" autoplay playsinline style="display:none;"></video>
            <video id="local-video" autoplay muted playsinline style="display:none;"></video>
            <button id="retry-btn" class="btn btn-retry" onclick="setupParent()">לא מתחבר? נסה שוב</button>
        </div>
    </div>

    <script>
        let peer = null;
        let stream = null;

        // הגדרות שרתים של גוגל לעקיפת חסימות רשת
        const peerConfig = {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
        };

        function setStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
            console.log(msg);
        }

        // --- צד המצלמה (טלפון) ---
        async function setupBaby() {
            const id = document.getElementById('secret-id').value;
            if (!id) return alert("הכנס מזהה סודי!");

            document.getElementById('mode-selection').style.display = 'none';
            setStatus("מפעיל מצלמה...");

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = stream;
                document.getElementById('local-video').style.display = 'block';

                peer = new Peer(id, peerConfig);
                
                peer.on('open', () => setStatus("המצלמה מוכנה! המזהה: " + id));
                peer.on('call', (call) => {
                    setStatus("הורה התחבר! שידור פעיל.");
                    call.answer(stream);
                });
                
                peer.on('error', (err) => {
                    if(err.type === 'unavailable-id') setStatus("המזהה תפוס. רענן ושנה שם.");
                    else setStatus("שגיאה: " + err.type);
                });

            } catch (e) { setStatus("שגיאה בגישה למצלמה: " + e.message); }
        }

        // --- צד ההורה (טאבלט) ---
        function setupParent() {
            const id = document.getElementById('secret-id').value;
            if (!id) return alert("הכנס מזהה סודי!");

            document.getElementById('mode-selection').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'block';
            setStatus("מחפש את המצלמה...");

            if (peer) peer.destroy();
            peer = new Peer(id + "-parent", peerConfig);

            peer.on('open', () => {
                setStatus("מנסה להתחבר למזהה: " + id + "...");
                const call = peer.call(id, null);
                
                call.on('stream', (remoteStream) => {
                    setStatus("שידור חי פעיל! ✅");
                    const v = document.getElementById('remote-video');
                    v.srcObject = remoteStream;
                    v.style.display = 'block';
                    document.getElementById('retry-btn').style.display = 'none';
                });

                // טיימר למקרה שהשיחה לא נענית
                setTimeout(() => {
                    if (document.getElementById('remote-video').style.display === 'none') {
                        setStatus("לא נמצאה מצלמה. וודא שהטלפון משדר.");
                    }
                }, 7000);
            });
        }
    </script>
</body>
</html>
