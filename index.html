<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor Debug v7</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 20px; border: 1px solid #444; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; min-height: 200px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; text-align: center; }
        #status { color: #fbbf24; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>מוניטור בטוח - ניסיון אחרון 👶</h3>
        <input type="text" id="sid" placeholder="מזהה קצר (למשל: 5555)">
        <div id="status">ממתין...</div>
        
        <button onclick="startBaby()" style="background: #e74c3c;">זה הטלפון (משדר)</button>
        <button onclick="startParent()" style="background: #2ecc71;">זה הטאבלט (צופה)</button>
        
        <video id="v" autoplay playsinline muted></video>
        <button id="audioBtn" style="display:none; background:#f1c40f; color:black" onclick="document.getElementById('v').muted=false; this.style.display='none'">הפעל סאונד 🔊</button>
    </div>

    <script>
        let peer = null;
        const status = document.getElementById('status');

        function startBaby() {
            const id = document.getElementById('sid').value;
            peer = new Peer(id);
            peer.on('open', () => status.innerText = "הטלפון מוכן! מזהה: " + id);
            
            navigator.mediaDevices.getUserMedia({video: {facingMode:"environment"}, audio:true})
            .then(stream => {
                document.getElementById('v').srcObject = stream;
                peer.on('call', call => {
                    status.innerText = "שיחה נכנסת! עונה...";
                    call.answer(stream);
                });
            });
        }

        function startParent() {
            const id = document.getElementById('sid').value;
            peer = new Peer(id + "-parent");
            peer.on('open', () => {
                status.innerText = "מחייג...";
                makeCall(id);
            });
        }

        function makeCall(targetId) {
            const call = peer.call(targetId, null);
            if (!call) {
                status.innerText = "חיוג נכשל. מנסה שוב...";
                setTimeout(() => makeCall(targetId), 3000);
                return;
            }
            call.on('stream', stream => {
                status.innerText = "שידור חי! ✅";
                const v = document.getElementById('v');
                v.srcObject = stream;
                v.play();
                document.getElementById('audioBtn').style.display = 'block';
            });
            // אם אחרי 5 שניות לא ענה
            setTimeout(() => {
                if (!document.getElementById('v').srcObject) {
                    status.innerText = "אין תגובה. מנסה שוב...";
                    call.close();
                    makeCall(targetId);
                }
            }, 5000);
        }
    </script>
</body>
</html>
