<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Debug Mode</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .log { border: 1px solid #0f0; padding: 10px; height: 150px; overflow-y: scroll; font-size: 12px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; }
        video { width: 100%; background: #222; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>בדיקת מערכת מוניטור</h3>
    <div id="log" class="log">מוכן...</div>
    
    <input type="text" id="sid" placeholder="מזהה סודי">
    <button onclick="asBaby()" style="background:#400; color:white">הפעל כמצלמה</button>
    <button onclick="asParent()" style="background:#040; color:white">הפעל כצופה</button>

    <video id="v" autoplay playsinline muted></video>

    <script>
        const log = (msg) => {
            const div = document.getElementById('log');
            div.innerHTML += `> ${msg}<br>`;
            div.scrollTop = div.scrollHeight;
        };

        let peer = null;

        function asBaby() {
            const id = document.getElementById('sid').value;
            log("מתחיל מצב מצלמה...");
            
            navigator.mediaDevices.getUserMedia({video: {facingMode:"environment"}, audio:true})
            .then(stream => {
                log("מצלמה אושרה ✅");
                document.getElementById('v').srcObject = stream;
                
                peer = new Peer(id);
                peer.on('open', () => log("רשום בשרת! מזהה: " + id));
                peer.on('call', call => {
                    log("!! שיחה נכנסת מההורה !!");
                    call.answer(stream);
                    log("עניתי לשיחה. השידור אמור להתחיל.");
                });
                peer.on('error', e => log("שגיאה: " + e.type));
            })
            .catch(e => log("שגיאת מצלמה: " + e.message));
        }

        function asParent() {
            const id = document.getElementById('sid').value;
            log("מתחיל מצב הורה...");
            
            peer = new Peer(id + "-parent");
            peer.on('open', () => {
                log("מחובר לשרת. מחייג למזהה: " + id);
                const call = peer.call(id, null);
                
                log("החיוג בוצע. ממתין לתגובה...");
                
                call.on('stream', remoteStream => {
                    log("קיבלתי וידאו! ✅✅");
                    const vid = document.getElementById('v');
                    vid.muted = false;
                    vid.srcObject = remoteStream;
                });

                setTimeout(() => {
                    if (!document.getElementById('v').srcObject) {
                        log("שגיאה: עברו 10 שניות ואין וידאו. המצלמה לא ענתה.");
                    }
                }, 10000);
            });
            peer.on('error', e => log("שגיאת התחברות: " + e.type));
        }
    </script>
</body>
</html>
