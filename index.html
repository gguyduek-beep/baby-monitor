<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor v6 - Stable</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; }
        .box { max-width: 400px; margin: 20px auto; background: #111; padding: 20px; border: 2px solid #333; border-radius: 20px; }
        video { width: 100%; border-radius: 10px; background: #222; margin: 10px 0; min-height: 200px; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; text-align: center; }
        #status { color: #ff9f43; font-weight: bold; padding: 10px; }
        .debug { font-size: 10px; color: #555; text-align: left; height: 50px; overflow: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h3>מוניטור ביתי 👶</h3>
        <input type="text" id="sid" placeholder="מזהה סודי (למשל: 1234)">
        
        <div id="controls">
            <button class="btn" style="background:#e74c3c; color:white" onclick="startCamera()">הפעל מצלמה (טלפון)</button>
            <button class="btn" style="background:#2ecc71; color:white" onclick="startParent()">הפעל צופה (טאבלט)</button>
        </div>

        <div id="status">מוכן...</div>
        <video id="v" autoplay playsinline muted></video>
        <button id="audioBtn" class="btn" style="display:none; background:#f1c40f" onclick="unmute()">לחץ כאן לשמיעת אודיו 🔊</button>
        <div id="dbg" class="debug"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const dbg = document.getElementById('dbg');
        let peer = null;
        let myStream = null;

        function log(m) { dbg.innerHTML += m + "<br>"; dbg.scrollTop = dbg.scrollHeight; }

        const iceConfig = {
            config: { 'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' },
                { 'urls': 'stun:global.stun.twilio.com:3478' }
            ] }
        };

        // --- מצב טלפון (מצלמה) ---
        async function startCamera() {
            const id = document.getElementById('sid').value;
            if(!id) return alert("הכנס מזהה!");
            status.innerText = "פותח מצלמה...";
            
            try {
                myStream = await navigator.mediaDevices.getUserMedia({video: {facingMode:"environment"}, audio:true});
                document.getElementById('v').srcObject = myStream;
                document.getElementById('controls').style.display = 'none';
                
                peer = new Peer(id, iceConfig);
                peer.on('open', () => status.innerText = "המצלמה באוויר! המזהה: " + id);
                peer.on('call', (call) => {
                    log("שיחה נכנסת! עונה...");
                    status.innerText = "ההורה התחבר ✅";
                    call.answer(myStream);
                });
            } catch(e) { status.innerText = "שגיאת מצלמה: " + e.message; }
        }

        // --- מצב טאבלט (צופה) ---
        function startParent() {
            const id = document.getElementById('sid').value;
            if(!id) return alert("הכנס מזהה!");
            document.getElementById('controls').style.display = 'none';
            status.innerText = "מתחבר...";

            peer = new Peer(id + "-parent", iceConfig);
            peer.on('open', () => {
                log("מחובר לשרת. מתחיל ניסיונות חיוג...");
                aggressiveCall(id);
            });
        }

        function aggressiveCall(targetId) {
            status.innerText = "מנסה להתחבר למצלמה...";
            const call = peer.call(targetId, null);
            
            call.on('stream', (stream) => {
                log("קיבלתי שידור! ✅");
                status.innerText = "שידור חי!";
                const video = document.getElementById('v');
                video.srcObject = stream;
                video.play();
                document.getElementById('audioBtn').style.display = 'block';
            });

            // אם אין שידור תוך 5 שניות, סוגר ומנסה שוב
            setTimeout(() => {
                if (!document.getElementById('v').srcObject) {
                    log("ניסיון נכשל, מנסה שוב...");
                    call.close();
                    aggressiveCall(targetId);
                }
            }, 5000);
        }

        function unmute() {
            const v = document.getElementById('v');
            v.muted = false;
            document.getElementById('audioBtn').style.display = 'none';
        }
    </script>
</body>
</html>
